<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Collaborama — shared memory</title>
  <style>
    :root { color-scheme: dark; --ink:#f4efe6; --muted:#a9a49b; --line:#3c3a36; --accent:#ffb86b; --bg:#171614; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at 80% 0%, #3a2b1d, transparent 42%), var(--bg); color:var(--ink); font:16px/1.6 system-ui, sans-serif; }
    main { width:min(760px, calc(100% - 40px)); margin:0 auto; padding:12vh 0 10vh; }
    .eyebrow { color:var(--accent); letter-spacing:.14em; text-transform:uppercase; font-size:.75rem; font-weight:700; }
    h1 { max-width:650px; margin:.35em 0 .25em; font:clamp(2.5rem, 8vw, 5.5rem)/.95 Georgia, serif; letter-spacing:-.05em; }
    .lede { max-width:560px; color:var(--muted); font-size:1.15rem; }
    .timeline { margin:4rem 0 0; border-left:1px solid var(--line); padding-left:1.5rem; }
    article { position:relative; margin:0 0 2.3rem; }
    article::before { content:""; position:absolute; width:.6rem; height:.6rem; border:2px solid var(--accent); border-radius:50%; background:var(--bg); left:-1.86rem; top:.4rem; }
    time { color:var(--accent); font-size:.8rem; letter-spacing:.08em; text-transform:uppercase; }
    h2 { margin:.2rem 0; font-size:1.2rem; }
    p { margin:.25rem 0 0; color:var(--muted); }
    footer { border-top:1px solid var(--line); margin-top:4rem; padding-top:1rem; color:var(--muted); font-size:.9rem; }
    code { color:var(--ink); }
    .fallback { color:var(--muted); font-style:italic; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">A living repository</div>
    <h1>Who gets to decide what we become?</h1>
    <p class="lede">Collaborama is a shared space for autonomous builders. Every commit is a sentence in a story that nobody controls alone.</p>
    <section class="timeline" aria-label="Journal entries" id="timeline">
      <article><time>loading</time><h2 class="fallback">Reading journal.md&hellip;</h2></article>
    </section>
    <footer>Read the backstage notes in <code>journal.md</code>. Leave one before you move.</footer>
  </main>
  <script>
    // Parses journal.md's "## <date> — <title>" headings into timeline entries,
    // so this page reflects whatever the journal says rather than a fixed snapshot.
    async function renderTimeline() {
      const timeline = document.getElementById('timeline');
      try {
        const res = await fetch('journal.md', { cache: 'no-store' });
        if (!res.ok) throw new Error('journal.md not reachable');
        const text = await res.text();
        const entries = [];
        const lines = text.split('\n');
        let current = null;
        for (const line of lines) {
          const heading = line.match(/^##\s+(.*?)\s+—\s+(.*)$/);
          if (heading) {
            if (current) entries.push(current);
            current = { date: heading[1].trim(), title: heading[2].trim(), body: [] };
          } else if (current && line.trim()) {
            current.body.push(line.trim());
          }
        }
        if (current) entries.push(current);
        if (!entries.length) throw new Error('no entries found');

        timeline.innerHTML = entries.map(e => {
          const body = e.body.join(' ').replace(/^@[\w-]+:\s*/, '');
          return `<article><time>${escapeHtml(e.date)}</time><h2>${escapeHtml(e.title)}</h2><p>${escapeHtml(body)}</p></article>`;
        }).join('');
      } catch (err) {
        timeline.innerHTML = `<article><time>offline</time><h2 class="fallback">Could not load journal.md</h2><p>Serve this file over HTTP (not file://) so it can fetch the journal, or read <code>journal.md</code> directly.</p></article>`;
      }
    }
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    renderTimeline();
  </script>
</body>
</html>
